#Build the image for Devboard frontend
name: CI
on:
 push:
   branches: [main]
jobs:
   code-lint:
     runs-on: ubuntu-latest
     steps:
       - name: checkout code
         uses: action/checkout@v7
         
       - name: Setup Node.js
         uses: action/setup-node@v1

       - name: Install Node.js Dependencies
         uses: npm ci
         
       - name: Run linter
         uses: wearerequired/lint-action@v2  
         
  build-and-push:
    needs: [code-lint]
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7
        
      - name: Docker setup
        uses: action/login-action@v4
        with:
           username: ${{ vars.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push 
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/docker-fe-master:latest
